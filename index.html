    <style>
        /* Styles Globaux - Thème Sombre Futuriste */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Montserrat', sans-serif;
            background-color: #0f172a; /* Fond bleu nuit */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.2); /* Bordure légère dorée */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* En-tête */
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fbbf24, #ec4899); /* Dégradé Or/Ambre vers Rose Néon */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Zone de commande */
        .order-section {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .order-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Bouton WhatsApp Dynamique */
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #25D366; /* Vert WhatsApp */
            color: #ffffff;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            width: 100%;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(37, 211, 102, 0.5);
            background-color: #20ba56;
        }

        .btn-whatsapp:active {
            transform: translateY(-1px);
        }

        /* Pied de page */
        .footer {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
